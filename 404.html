<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - iNaturalist Tools</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="favicon.ico" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .notfound {
        text-align: center;
        max-width: 420px;
      }
      .notfound img {
        width: 96px;
        height: 96px;
        margin-bottom: 20px;
      }
      .notfound h1 {
        font-size: 1.6rem;
        margin-bottom: 10px;
      }
      .notfound p {
        color: #666;
        margin-bottom: 24px;
      }
      .notfound a {
        display: inline-block;
        background: #74ac00;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 12px 24px;
        border-radius: 8px;
      }
      .notfound a:hover {
        background: #659900;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #1a1a1a;
          color: #e0e0e0;
        }
        .notfound p {
          color: #aaa;
        }
      }
    </style>
  </head>
  <body>
    <div class="notfound">
      <img src="/inat/logo.png" alt="iNaturalist Tools logo" />
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has moved.</p>
      <a href="/inat/">Back to iNaturalist Tools</a>
    </div>
  </body>
</html>
