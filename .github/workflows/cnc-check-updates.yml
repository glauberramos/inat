name: CNC Check Updates

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install dotenv @supabase/supabase-js

      - name: Check and sync outdated project
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const { execSync } = require('child_process');
          const db = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);

          async function rateLimitedFetch(url) {
            const res = await fetch(url, { headers: { 'User-Agent': 'CNC-Check/1.0' } });
            if (res.status === 429) {
              console.log('Rate limited, waiting 60s...');
              await new Promise(r => setTimeout(r, 60000));
              return rateLimitedFetch(url);
            }
            if (!res.ok) throw new Error('API error ' + res.status);
            return res.json();
          }

          const CURSOR_KEY = '__check_updates_cursor';

          async function getCursor() {
            const { data } = await db
              .from('cnc_sync_log')
              .select('status')
              .eq('project_slug', CURSOR_KEY)
              .limit(1);
            return data && data.length > 0 ? data[0].status : null;
          }

          async function saveCursor(slug) {
            await db.from('cnc_sync_log').upsert({
              project_slug: CURSOR_KEY,
              status: slug,
              completed_at: new Date().toISOString()
            }, { onConflict: 'project_slug' });
          }

          async function main() {
            // Get all synced projects
            const { data: projects, error } = await db
              .from('cnc_projects')
              .select('slug, total_observations')
              .order('slug', { ascending: true });

            if (error || !projects || projects.length === 0) {
              console.log('No projects found');
              return;
            }

            // Only check projects that have been synced
            const { data: syncLogs } = await db
              .from('cnc_sync_log')
              .select('project_slug')
              .eq('status', 'done');

            const syncedSlugs = new Set((syncLogs || []).map(r => r.project_slug));
            const syncedProjects = projects.filter(p => syncedSlugs.has(p.slug));

            if (syncedProjects.length === 0) {
              console.log('No synced projects to check');
              return;
            }

            // Find where to start from cursor
            const lastCursor = await getCursor();
            let startIdx = 0;
            if (lastCursor) {
              const idx = syncedProjects.findIndex(p => p.slug > lastCursor);
              startIdx = idx >= 0 ? idx : 0; // wrap around if past end
              console.log('Resuming after: ' + lastCursor + ' (index ' + startIdx + ')');
            }

            console.log('Checking ' + syncedProjects.length + ' synced projects...');

            let synced = 0;
            let checked = 0;
            let lastSlug = lastCursor;

            while (synced < 3 && checked < syncedProjects.length) {
              const idx = (startIdx + checked) % syncedProjects.length;
              const p = syncedProjects[idx];
              checked++;
              lastSlug = p.slug;

              await new Promise(r => setTimeout(r, 1000));
              const data = await rateLimitedFetch(
                'https://api.inaturalist.org/v1/observations?project_id=' + p.slug + '&per_page=1'
              );
              const apiCount = data.total_results || 0;
              const dbCount = p.total_observations || 0;

              if (apiCount !== dbCount) {
                console.log(p.slug + ': DB=' + dbCount + ' API=' + apiCount + ' -> syncing');
                try {
                  // Try incremental first
                  execSync('node scripts/cnc-sync.js --project=' + p.slug, { stdio: 'inherit' });

                  // Check if count matches now
                  await new Promise(r => setTimeout(r, 1000));
                  const recheck = await rateLimitedFetch(
                    'https://api.inaturalist.org/v1/observations?project_id=' + p.slug + '&per_page=1'
                  );
                  const { count: dbRecount } = await db
                    .from('cnc_observations')
                    .select('id', { count: 'exact', head: true })
                    .eq('project_slug', p.slug);

                  if ((recheck.total_results || 0) !== (dbRecount || 0)) {
                    console.log('Still mismatched after incremental (' + dbRecount + ' vs ' + recheck.total_results + '), doing full sync...');
                    execSync('node scripts/cnc-sync.js --project=' + p.slug + ' --full', { stdio: 'inherit' });
                  }

                  execSync('node scripts/cnc-consolidate.js --project=' + p.slug, { stdio: 'inherit' });
                } catch (e) {
                  console.error('Sync failed: ' + e.message);
                }
                synced++;
              } else {
                console.log(p.slug + ': OK (' + dbCount + ')');
              }
            }

            // Save cursor for next run
            await saveCursor(lastSlug);
            console.log('Checked ' + checked + ', synced ' + synced + '. Cursor saved at: ' + lastSlug);
          }

          main().catch(e => { console.error(e); process.exit(1); });
          "
